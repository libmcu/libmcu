name: sonarCloud

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sonarCloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # (선택) 토큰 주입 여부를 명확히 실패로 보여주기 위한 가드
      - name: Ensure SONAR_TOKEN is available
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "SONAR_TOKEN is empty. Check repository Actions secret 'SONAR_TOKEN'."
            exit 1
          fi

      # build-wrapper 실행 (빌드 커맨드를 build-wrapper로 감싸야 C/C++ 분석 가능)
      - name: Build (captured by build-wrapper)
        shell: bash
        run: |
          curl -sSLo bw.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip -q bw.zip
          ./build-wrapper-linux-x86/build-wrapper-linux-x86-64 \
            --out-dir "${{ env.BUILD_WRAPPER_OUT_DIR }}" \
            make BOARD=native

      - name: Build coverage results
        shell: bash
        run: |
          make -C tests install
          make -C tests
          make -C tests gcov
          mkdir -p coverage_report
          cp -R tests/gcov/*.gcov coverage_report/

      # SonarCloud scan (여기서 action을 사용)
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            --define sonar.cfamily.build-wrapper-output=${{ env.BUILD_WRAPPER_OUT_DIR }}
            --define sonar.organization=libmcu
            --define sonar.projectKey=libmcu_libmcu
            --define sonar.sources=modules,ports
            --define sonar.tests=tests
            --define sonar.test.inclusions=**/*_test.cpp
            --define sonar.cfamily.gcov.reportsPath=coverage_report
